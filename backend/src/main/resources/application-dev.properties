# Run without MySQL: use in-memory H2 (schema created by Hibernate).
# Start with: --spring.profiles.active=dev
# Or set env: SPRING_PROFILES_ACTIVE=dev

spring.datasource.url=jdbc:h2:mem:fieldforce;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# Application HTTP Configuration
server.port=8081

# If startup fails with UnsatisfiedDependencyException / DataSource errors:
# 1) Start MySQL on localhost:3306 (user/password below), OR
# 2) Run with profile "dev" for in-memory H2: --spring.profiles.active=dev
# spring.profiles.active=dev

# MySQL Database Configuration
# The flag 'createDatabaseIfNotExist=true' guarantees that MySQL creates the 'fieldforce_db' if it's not already there.
spring.datasource.url=jdbc:mysql://localhost:3306/fieldforce_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Configuration
# 'update' ensures the tables described by our Java entities are created in the database and preserved moving forward.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configurations
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expirationMs=86400000

# ISO-8601 strings for LocalDateTime in JSON (easier for JavaScript)
spring.jackson.serialization.write-dates-as-timestamps=false
